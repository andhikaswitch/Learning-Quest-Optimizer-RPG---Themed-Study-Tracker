<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#04263a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#06202d"/>
      <stop offset="100%" stop-color="#0b2a3a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <g transform="translate(60,40)">
    <rect width="1080" height="595" rx="16" fill="url(#card)" stroke="#123047" stroke-width="1"/>
    <text x="40" y="60" fill="#ffffff" font-size="40" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700">Learning Quest Optimizer</text>
    <text x="40" y="96" fill="#9fb4c9" font-size="16">Dashboard — pantau progres, lihat rekomendasi, dan lanjutkan quest-mu</text>

    <!-- Left column: cards -->
    <g transform="translate(40,140)">
      <rect width="360" height="420" rx="12" fill="#071a2a" stroke="#18435a"/>
      <text x="24" y="40" fill="#7dd3fc" font-size="18">Progress Mingguan</text>
      <!-- progress bars -->
      <g transform="translate(24,80)">
        <text x="0" y="0" fill="#cbd5e1" font-size="13">React Basics</text>
        <rect x="0" y="8" width="300" height="12" rx="6" fill="#0b1220" stroke="#173447"/>
        <rect x="0" y="8" width="220" height="12" rx="6" fill="#22c55e"/>
        <text x="312" y="18" fill="#9fb4c9" font-size="12">73%</text>

        <text x="0" y="48" fill="#cbd5e1" font-size="13">Algorithms</text>
        <rect x="0" y="56" width="300" height="12" rx="6" fill="#0b1220" stroke="#173447"/>
        <rect x="0" y="56" width="160" height="12" rx="6" fill="#60a5fa"/>
        <text x="312" y="66" fill="#9fb4c9" font-size="12">53%</text>

        <text x="0" y="96" fill="#cbd5e1" font-size="13">CSS Layouts</text>
        <rect x="0" y="104" width="300" height="12" rx="6" fill="#0b1220" stroke="#173447"/>
        <rect x="0" y="104" width="280" height="12" rx="6" fill="#f59e0b"/>
        <text x="312" y="114" fill="#9fb4c9" font-size="12">93%</text>
      </g>
    </g>

    <!-- Right column: recommendations -->
    <g transform="translate(440,140)">
      <rect width="680" height="420" rx="12" fill="#071b27" stroke="#1a3b4d"/>
      <text x="28" y="40" fill="#7ef0c7" font-size="18">Rekomendasi Berikutnya</text>

      <g transform="translate(28,80)">
        <rect width="600" height="84" rx="8" fill="#052233" stroke="#134357"/>
        <text x="20" y="34" fill="#e6f9f0" font-size="16">Buat mini-project: Todo App (React)</text>
        <text x="20" y="58" fill="#9fb4c9" font-size="12">Estimasi: 3 jam • Level: Menengah</text>

        <rect y="108" width="600" height="84" rx="8" fill="#052233" stroke="#134357"/>
        <text x="20" y="154" fill="#e6f9f0" font-size="16">Latihan Algoritma: Binary Search Practice</text>
        <text x="20" y="178" fill="#9fb4c9" font-size="12">Estimasi: 30 menit • Level: Mudah</text>

        <rect y="216" width="600" height="84" rx="8" fill="#052233" stroke="#134357"/>
        <text x="20" y="262" fill="#e6f9f0" font-size="16">Belajar: Flexbox dan Grid Layouts</text>
        <text x="20" y="286" fill="#9fb4c9" font-size="12">Estimasi: 45 menit • Level: Mudah</text>
      </g>
    </g>

    <text x="40" y="570" fill="#9fb4c9" font-size="12">(Ganti gambar ini dengan screenshot asli: simpan ke src/img/screenshot-1.svg)</text>
  </g>
</svg>